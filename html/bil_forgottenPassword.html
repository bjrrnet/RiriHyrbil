<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1">
    <title>Bilix | Forgotten Password</title>
    <link rel="icon" type="image/png"  href="../html/social/head.png?v=2">
    <link rel="stylesheet" href="../css/bil_forgottenPassword.css">
</head>

<body>
    <header id="bilix-logo">
        <a href="biluthyrning.html">
            <img src="../html/social/car_logo.png" alt="Bilix logo">
        </a>    
    </header>
        <main class="main-container">
            <div class="card container">
                <div class="form-section">
                    <h4>Forgot Your Password?</h4>
                    <p>We get it, stuff happens. Just enter your email address below and we'll send you a link to reset your password!</p>
                    <form class="user">
                        <input type="email" id="txtEmail" placeholder="Enter Email Address" name="email" required>
                        <button type="button" id="btnResetPassword">Reset Password</button>
                    </form>
                    <div class="links">
                        <a href="../html/bil_register.html">Create an Account!</a><br>
                        <a href="../html/bil_login.html">Already have an account? Login!</a>
                    </div>
                </div>
            </div>
        </main>

    <script src="../js/bil_forgottenPassword.js"></script>
</body>
</html>
