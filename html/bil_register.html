<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1">
    <title>Bilix | Register</title>
    <link rel="icon" type="image/png"  href="../html/social/head.png?v=2">
    <link rel="stylesheet" href="../css/bil_register.css">
</head>
<body class="fp_bg_img">
    <div id="bilix-logo">
        <a href="biluthyrning.html">
            <img src="../html/social/car_logo.png" alt="Bilix logo">
        </a>
    </div>
    <div class="card">
        <div class="right-side">
            <h4>Create Bilix an Account!</h4>
            <form id="registerForm"> 
                <div class="form-row">
                    <input type="text" placeholder="Full Name" name="full_name" id="txtFullName" required style="width: 100%;">
                </div>
                <div class="form-row">
                    <input type="email" placeholder="Email Address" name="email" id="txtEmail" required style="width: 100%;">
                </div>            
                <div class="form-row">
                    <input type="password" placeholder="Password" name="password" id="txtPassword" required>
                    <input type="password" placeholder="Repeat Password" name="password_repeat" id="txtConfirmPassword" required>
                </div>
                <button class="btn" type="button" id="btn_Register">
                    Register Account
                </button>
            </form>
        </div>

                <div class="text-center">
                    <a href="../html/bil_forgottenPassword.html">Forgot Password?</a>
                </div>
                <div class="text-center">
                    <a href="../html/bil_login.html">Already have an account? Login!</a>
                </div>
    </div>
    
    <script src="../js/bil_register.js"></script>

</body>
</html>
