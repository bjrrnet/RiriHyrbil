<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1">
    <title>Bilix | New Password</title>
    <link rel="icon" type="image/png"  href="../html/social/head.png?v=2">
    <link rel="stylesheet" href="../css/reset_password.css">
</head>
<body>
    <div class="container">
        <h3>Choose a New Password</h3>
        <p>Enter your new password below.</p>
        
        <input type="password" id="newPassword" placeholder="New password" required>
        <button id="btnUpdate">Save Password</button>
        
        <p id="msg"></p>
    </div>

    <script>
        document.getElementById('btnUpdate').addEventListener('click', async function() {

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const password = document.getElementById('newPassword').value;
            const msg = document.getElementById('msg');

            if (password.length < 6) {
                msg.innerText = "Password must be at least 6 characters.";
                return;
            }

            const response = await fetch('../public/api2.php?action=reset_password_submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    token: token, 
                    password: password 
                })
            });

            const result = await response.json();
            
            if (result.success) {
                alert(result.message);
                window.location.href = '../html/bil_login.html';
            } else {
                msg.innerText = result.message;
                msg.style.color = "red";
            }
        });
    </script>
</body>
</html>
